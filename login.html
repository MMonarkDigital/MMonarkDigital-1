<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — MMonark Digital</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="login-page">
  <div class="login-container">
    <h1 class="login-title">Welcome Back</h1>
    <p class="login-sub">Sign in to access your dashboard</p>
    <form class="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>EMAIL</label>
        <input type="email" id="login-email" placeholder="" required/>
      </div>
      <div class="form-group">
        <label>PASSWORD</label>
        <input type="password" id="login-password" placeholder="" required/>
      </div>
      <div class="login-error" id="login-error" style="display:none;">Invalid email or password.</div>
      <button type="submit" class="btn-primary btn-full">SIGN IN</button>
      <p class="login-footer">Don't have an account? <a href="#" class="gold-link">Sign up</a></p>
      <p class="login-footer"><a href="index.html" class="muted-link">← Back to home</a></p>
    </form>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
